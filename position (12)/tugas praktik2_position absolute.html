<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas praktik2</title>
    <style>
        .container {
            position: relative;
            width: 300px;
            height: 300px;
            background-color: lightgray;
        }

        .box1 {
            position: absolute;
            top: 0;
            left: 0;
            background-color: coral;
            width: 50px;
            height: 50px;
        }

        .box2 {
            position: absolute;
            top: 0;
            right: 0;
            background-color: blue;
            width: 50px;
            height: 50px;
        }

        .box3 {
            position: absolute;
            bottom: 0;
            left: 0;
            background-color: green;
            width: 50px;
            height: 50px;
        }

        .box4 {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: yellow;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box3"></div>
        <div class="box4"></div>
    </div>
</body>
</html>
