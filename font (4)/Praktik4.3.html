<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Weight with Keyword</title>
    <style>
        .w-lighter {
            font-weight: lighter;
        }
        .w-normal {
            font-style: normal;
        }
        .w-bold {
            font-weight: bold;
        }
        .w-bolder {
            font-weight: bolder;
        }
    </style>
</head>
<body>
    <p class="w-lighter">This is lighter weight text.</p>
    <p class="w-lighter">This is normal weight text.</p>
    <p class="w-lighter">This is bold weight text.</p>
    <p class="w-lighter">This is bolder weight text.</p>
</body>
</html>
