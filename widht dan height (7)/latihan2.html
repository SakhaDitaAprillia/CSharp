<!DOCTYPE html>
<html lang="en">
<head>
    <title>Latihan Layout</title>
    <style>
        .header{
            width:100%;
            height:100px;
            background-color: lightblue;
            text-align:center;
            line-height:100px;
        }

        .content{
            width:100%;
            height:300px;
            background-color: lightgray;
            text-align:center;
            line-height:300px;
        }

        .footer{
            width:100%;
            height:80px;
            background-color: lightpink;
            text-align:center;
            line-height:80px;
        }
    </style>
</head>
<body>

    <div class="header">
        Header
    </div>

    <div class="content">
        Content
    </div>

    <div class="footer">
        Footer
    </div>
</body>
</html>
