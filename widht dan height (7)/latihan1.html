<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Width Height</title>
    <style>
body{
    font-family: Arial;
}

.box1{
    width: 200px;
    height: 200px;
    background-color: lightblue;
    margin-bottom: 10px;
}

.box2{
    width: 50%;
    height: 150px;
    background-color: lightgreen;
    margin-bottom: 10px;
}

.box3{
    width: 80vw;
    height: 30vh;
    background-color: lightcoral;
}
</style>

</head>

<body>

<h2>Latihan 1</h2>

<div class="box1"></div>
<div class="box2"></div>
<div class="box3"></div>

</body>
</html>
