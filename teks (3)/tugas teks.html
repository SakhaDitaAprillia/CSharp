<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas praktik 3</title>
    <!DOCTYPE html>
    <style>
        h1 {
            text-align: center;
        }
        .kiri {
            text-align: left;
        }
        .kanan {
            text-align: right;
        }
        .justify {
            text-align: justify;
        }
    </style>
</head>
<body>

    <h1>Contoh Text Align</h1>

    <p class="kiri">Ini adalah contoh teks rata kiri.</p>

    <p class="kanan">Ini adalah contoh teks rata kanan.</p>

    <p class="justify">
        Ini adalah contoh teks justify. Teks ini akan rata kiri dan kanan sehingga terlihat lebih rapi dan memenuhi satu baris penuh seperti paragraf dalam buku.
    </p>
    
</body>
</html>
