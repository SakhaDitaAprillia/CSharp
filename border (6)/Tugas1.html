<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan atau Tugas Pertama</title>
    <style>
        header {
            border: 2px solid black;
            text-align: center;
        }
        .double {
            border: 2px double blue;
            padding: 5px;
            margin: 5px;
        }
        .groove {
            border: 2px groove green;
            padding: 5px;
            margin: 10px;
            text-align: right;
        }
        .ridge {
            border: 5px ridge red;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Latihan 1</h1>
    </header>
    <div class="double">Ini adalah border double berwarna biru</div>
    <div class="groove">Ini adalah border groove berwarna hijau</div>
    <div class="ridge">Ini adalah border ridge berwarna merah</div>
</body>
</html>
