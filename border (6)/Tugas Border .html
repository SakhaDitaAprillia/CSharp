<!DOCTYPE html>
<html>
<head>
    <title>Praktik Border 1</title>
    <style>
        .solid {
            border: 3px solid blue;
            padding: 10px;
            background-color: #e7f0ff;
        }

        .dotted {
            border: 3px dotted red;
            padding: 10px;
            background-color: #ffe7e7;
        }

        .double {
            border: 5px double green;
            padding: 10px;
            background-color: #e7ffe7;
        }
        .dashed {
            border: 3px dashed purple;
            padding: 10px;
            background-color: #f3e7ff;
        }
        .groove {
            border: 3px groove orange;
            padding: 10px;
            background-color: #f5e6e0;
        }
        .ridge {
            border: 3px ridge brown;
            padding: 10px;
            background-color: #f5e6e0;
        }
    </style>
</head>
<body>

    <h2>Contoh Border CSS</h2>

    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>

</body>
</html>
